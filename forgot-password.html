<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Stackly IT Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #1a4ffa;
            --brand-dark: #0a0f1c;
            --brand-light: #f4f7fb;
            --brand-gray: #e2e8f0;
            --brand-text: #64748b;
            --white: #ffffff;
            --danger: #ef4444;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --transition: all 0.3s ease;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-main); }
        body { background-color: var(--brand-light); color: var(--brand-dark); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; padding: 40px 20px; }
        
        .bg-glow-1 { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70vw; height: 70vw; background: radial-gradient(circle, rgba(26, 79, 250, 0.08) 0%, transparent 60%); filter: blur(60px); z-index: 0; pointer-events: none; }

        .auth-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid var(--white);
            border-radius: 40px;
            padding: 50px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.05);
            z-index: 10;
            opacity: 0;
            transform: translateY(30px);
            text-align: center;
        }

        .auth-icon { width: 64px; height: 64px; background: rgba(26, 79, 250, 0.1); color: var(--brand-blue); border-radius: 20px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 24px; }
        .auth-header h2 { font-size: 28px; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.02em; }
        .auth-header p { color: var(--brand-text); font-weight: 500; font-size: 15px; margin-bottom: 30px; line-height: 1.6;}

        .form-group { text-align: left; margin-bottom: 24px; }
        .form-control { width: 100%; padding: 16px 24px; border-radius: 999px; border: 1px solid var(--brand-gray); background: var(--white); font-size: 15px; font-family: inherit; transition: var(--transition); }
        .form-control:focus { outline: none; border-color: var(--brand-blue); box-shadow: 0 0 0 4px rgba(26, 79, 250, 0.1); }
        .form-control.error { border-color: var(--danger); }
        .error-text { color: var(--danger); font-size: 12px; font-weight: 600; margin-top: 6px; margin-left: 12px; display: none; }
        .form-control.error + .error-text { display: block; }

        .submit-btn { width: 100%; padding: 18px; border-radius: 999px; background: var(--brand-dark); color: var(--white); border: none; font-size: 16px; font-weight: 700; cursor: pointer; transition: var(--transition); }
        .submit-btn:hover { background: var(--brand-blue); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        .auth-footer { margin-top: 30px; font-size: 15px; font-weight: 700; }
        .auth-footer a { color: var(--brand-text); text-decoration: none; transition: color 0.3s; display: inline-flex; align-items: center; gap: 8px;}
        .auth-footer a:hover { color: var(--brand-dark); }
        .auth-logo { display: inline-flex; align-items: center; gap: 10px; font-size: 24px; font-weight: 800; color: var(--brand-dark); margin-bottom: 15px; text-decoration: none; margin-left: auto; margin-right: auto;}
    </style>
</head>
<body>
    <div class="bg-glow-1"></div>

    <div class="auth-card" id="authCard">
        <div class="auth-header">
            <a href="index.html" class="auth-logo">
                <img src="images/blue-logo.webp" alt="Stackly Logo" style="height: 64px;">
            </a>
            <h2>Reset Password</h2>
            <p>Enter the email address associated with your account and we'll send you a link to reset your password.</p>
        </div>

        <form id="resetForm" novalidate>
            <div class="form-group">
                <input type="email" id="email" class="form-control" placeholder="Enter your email address" required>
                <div class="error-text">Please enter a valid email address.</div>
            </div>
            
            <button type="submit" class="submit-btn" id="submitBtn">Send Reset Link</button>
        </form>

        <div class="auth-footer">
            <a href="login.html">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Back to Login
            </a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        gsap.to("#authCard", { y: 0, opacity: 1, duration: 0.8, ease: "power3.out", delay: 0.2 });

        const form = document.getElementById('resetForm');
        const emailInput = document.getElementById('email');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const isValidEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput.value);

            if (!isValidEmail) {
                emailInput.classList.add('error');
            } else {
                emailInput.classList.remove('error');
                const btn = document.getElementById('submitBtn');
                btn.innerHTML = 'Sending...';
                
                // Requested behavior: Navigate to 404 page
                gsap.to("#authCard", { 
                    scale: 0.95, opacity: 0, duration: 0.4, ease: "power2.in",
                    onComplete: () => window.location.href = '404.html'
                });
            }
        });

        emailInput.addEventListener('input', () => emailInput.classList.remove('error'));
    </script>
</body>
</html>
