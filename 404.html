<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found - Stackly IT Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #1a4ffa;
            --brand-dark: #0a0f1c;
            --brand-light: #f4f7fb;
            --brand-text: #64748b;
            --white: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--brand-dark); color: var(--white); height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; overflow: hidden; position: relative;}
        
        .glow { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(26, 79, 250, 0.2) 0%, transparent 70%); filter: blur(60px); z-index: 0; }

        .content-box { position: relative; z-index: 10; max-width: 600px; padding: 20px; }
        
        .error-code { font-size: clamp(100px, 15vw, 180px); font-weight: 800; line-height: 1; letter-spacing: -0.05em; background: linear-gradient(135deg, #ffffff 0%, #64748b 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        
        h2 { font-size: clamp(24px, 4vw, 36px); font-weight: 800; margin-bottom: 20px; }
        p { font-size: 18px; color: #94a3b8; margin-bottom: 40px; line-height: 1.6; }

        .btn-home { display: inline-flex; align-items: center; gap: 10px; padding: 18px 36px; background: var(--brand-blue); color: var(--white); border-radius: 999px; text-decoration: none; font-weight: 700; font-size: 16px; transition: all 0.3s ease; }
        .btn-home:hover { background: #153eeb; transform: translateY(-3px); box-shadow: 0 10px 30px rgba(26, 79, 250, 0.3); }
        .logo { display: inline-flex; align-items: center; gap: 10px; font-size: 24px; font-weight: 800; color: var(--white); text-decoration: none; margin-bottom: 40px; }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="content-box" id="errorBox">
        <a href="index.html" class="logo">
            <img src="images/blue-logo.webp" alt="Stackly Logo" style="height: 50px;">
        </a>
        <div class="error-code">404</div>
        <h2>Page not found</h2>
        <p>The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
        <a href="index.html" class="btn-home">
            Return to Homepage
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
        </a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        gsap.fromTo("#errorBox", 
            { y: 50, opacity: 0, scale: 0.95 }, 
            { y: 0, opacity: 1, scale: 1, duration: 0.8, ease: "back.out(1.2)" }
        );
    </script>
</body>
</html>
